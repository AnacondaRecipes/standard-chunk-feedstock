{% set name = "standard-chunk" %}
{% set version = "3.13.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/standard_chunk-{{ version }}.tar.gz
  sha256: 4ac345d37d7e686d2755e01836b8d98eda0d1a3ee90375e597ae43aaf064d654

build:
  # Backport of the stdlib `chunk` module removed in Python 3.13; only needed on py>=3.13.
  skip: true  # [py<313]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - setuptools >=75.0
    - pip
  run:
    - python

test:
  imports:
    - chunk
  commands:
    - pip check
  requires:
    - pip

about:
  summary: Standard library chunk redistribution. "dead battery".
  license: PSF-2.0
  license_family: PSF
  license_file: LICENSE
  home: https://github.com/youknowone/python-deadlib
  doc_url: https://github.com/youknowone/python-deadlib
  dev_url: https://github.com/youknowone/python-deadlib

extra:
  recipe-maintainers:
    - bmcfee
